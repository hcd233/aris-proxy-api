apiVersion: apps/v1
kind: Deployment
metadata:
  name: aris-proxy-api
  namespace: aris-proxy-api
  labels:
    app: aris-proxy-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: aris-proxy-api
  template:
    metadata:
      labels:
        app: aris-proxy-api
    spec:
      terminationGracePeriodSeconds: 660
      containers:
      - name: app
        image: ghcr.io/hcd233/aris-proxy-api:PLACEHOLDER
        imagePullPolicy: IfNotPresent
        command: ["/app/aris-proxy-api", "server", "start", "--host", "0.0.0.0", "--port", "8080"]
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: aris-proxy-api-config
        - secretRef:
            name: aris-proxy-api-secret
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi
      volumes:
      - name: logs
        emptyDir:
          sizeLimit: 512Mi
