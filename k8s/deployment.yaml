apiVersion: apps/v1
kind: Deployment
metadata:
  name: aris-proxy-api
  namespace: aris-proxy-api
  labels:
    app: aris-proxy-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aris-proxy-api
  template:
    metadata:
      labels:
        app: aris-proxy-api
    spec:
      initContainers:
      - name: db-migrate
        image: ghcr.io/hcd233/aris-proxy-api:PLACEHOLDER
        command: ["/app/aris-proxy-api", "database", "migrate"]
        envFrom:
        - configMapRef:
            name: aris-proxy-api-config
        - secretRef:
            name: aris-proxy-api-secret
      containers:
      - name: app
        image: ghcr.io/hcd233/aris-proxy-api:PLACEHOLDER
        command: ["/app/aris-proxy-api", "server", "start", "--host", "0.0.0.0", "--port", "8080"]
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: aris-proxy-api-config
        - secretRef:
            name: aris-proxy-api-secret
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: logs
        hostPath:
          path: /opt/aris-proxy-api/logs
          type: DirectoryOrCreate
