version: '3'

services:
  postgresql:
    image: postgres:15
    container_name: postgresql
    restart: always
    ports:
      - 5432:5432
    env_file:
      - ../env/postgresql.env
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcd233 -d aris-proxy-api"]
      interval: 5s
      retries: 10

  redis:
    image: bitnami/redis:latest
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    env_file:
      - ../env/redis.env
    volumes:
      - redis-data:/bitnami/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgresql-data:
    name: postgresql-data
    external: true
  redis-data:
    name: redis-data
    external: true

